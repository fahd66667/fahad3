<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniNews | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF3B30; --bg: #F2F2F7; --text: #1C1C1E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { padding: 40px 20px; background: #fff; text-align: center; border-bottom: 1px solid #e5e5ea; }
        header h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .hero { margin: 20px; border-radius: 24px; overflow: hidden; position: relative; height: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .hero-img { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800') center/cover; }
        .hero-text { position: absolute; bottom: 0; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; width: 100%; }
        .section-title { padding: 0 20px; font-size: 20px; font-weight: 800; margin-bottom: 15px; }
        .feed { padding: 0 20px; }
        .card { background: #fff; border-radius: 18px; padding: 15px; display: flex; gap: 15px; margin-bottom: 15px; text-decoration: none; color: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .card-info h3 { font-size: 15px; line-height: 1.3; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #e5e5ea; }
        nav a { text-decoration: none; font-size: 22px; color: #8e8e93; transition: 0.3s; }
        nav a.active { color: var(--primary); }
    </style>
</head>
<body>
    <header><h1>OmniNews</h1></header>
    <div class="hero">
        <div class="hero-img"></div>
        <div class="hero-text">
            <small>TOP STORY</small>
            <h2>Global Energy Markets Brace for Major Shifts</h2>
        </div>
    </div>
    <h2 class="section-title">Latest Updates</h2>
    <div class="feed">
        <a href="world.html" class="card">
            <img src="https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=200">
            <div class="card-info"><h3>International delegations meet for peace summit...</h3></div>
        </a>
    </div>

    <a href="politics.html">Politics</a>
    <a href="travel.html">Travel</a>
</nav>
</body>
</html>
